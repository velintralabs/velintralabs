<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E0E7FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  
  <!-- Abstract composition -->
  <g opacity="0.6">
    <!-- Large circle -->
    <circle cx="200" cy="200" r="150" fill="none" stroke="#4F46E5" stroke-width="1" opacity="0.2"/>
    <circle cx="200" cy="200" r="120" fill="none" stroke="#4F46E5" stroke-width="1" opacity="0.3"/>
    <circle cx="200" cy="200" r="90" fill="none" stroke="#4F46E5" stroke-width="1" opacity="0.4"/>
    
    <!-- Small circle -->
    <circle cx="900" cy="150" r="100" fill="none" stroke="#10B981" stroke-width="1" opacity="0.3"/>
    <circle cx="900" cy="150" r="70" fill="none" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Dashboard cards -->
  <g transform="translate(300, 100)">
    <rect width="180" height="120" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(79,70,229,0.15))"/>
    <rect x="20" y="20" width="60" height="8" rx="4" fill="#4F46E5"/>
    <rect x="20" y="40" width="140" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="20" y="56" width="120" height="6" rx="3" fill="#E5E7EB"/>
    
    <!-- Chart -->
    <path d="M 20 90 L 50 70 L 80 80 L 110 50 L 140 60 L 160 40" stroke="#4F46E5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="40" r="5" fill="#4F46E5"/>
  </g>
  
  <g transform="translate(520, 130)">
    <rect width="160" height="100" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(79,70,229,0.12))"/>
    <circle cx="80" cy="35" r="25" fill="#ECFDF5"/>
    <path d="M 65 35 L 75 45 L 95 25" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="70" width="100" height="8" rx="4" fill="#E5E7EB"/>
  </g>
  
  <g transform="translate(720, 110)">
    <rect width="180" height="120" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(79,70,229,0.12))"/>
    <rect x="20" y="20" width="140" height="60" rx="8" fill="#FEF3C7"/>
    <rect x="20" y="95" width="100" height="8" rx="4" fill="#E5E7EB"/>
  </g>
  
  <!-- Connecting dots -->
  <circle cx="390" cy="160" r="4" fill="#4F46E5"/>
  <circle cx="600" cy="180" r="4" fill="#10B981"/>
  <circle cx="810" cy="170" r="4" fill="#D97706"/>
</svg>
