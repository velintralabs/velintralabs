<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="featuredGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="500" fill="url(#featuredGrad)"/>
  
  <!-- Before/After comparison -->
  <g transform="translate(150, 100)">
    <!-- Before side -->
    <rect width="420" height="300" rx="16" fill="white" opacity="0.7" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.08))"/>
    <text x="30" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#DC2626">BEFORE</text>
    
    <!-- Messy layout -->
    <rect x="30" y="60" width="360" height="20" rx="4" fill="#F3F4F6"/>
    <rect x="30" y="90" width="280" height="20" rx="4" fill="#F3F4F6"/>
    <rect x="30" y="120" width="320" height="20" rx="4" fill="#F3F4F6"/>
    <rect x="30" y="160" width="100" height="32" rx="16" fill="#D1D5DB"/>
    <rect x="30" y="210" width="360" height="60" rx="8" fill="#FEE2E2" opacity="0.5"/>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(600, 250)">
    <circle r="30" fill="white" filter="drop-shadow(0 6px 20px rgba(79,70,229,0.2))"/>
    <path d="M -10 0 L 10 0 M 5 -5 L 10 0 L 5 5" stroke="#4F46E5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- After side -->
  <g transform="translate(650, 100)">
    <rect width="420" height="300" rx="16" fill="white" filter="drop-shadow(0 12px 40px rgba(79,70,229,0.2))"/>
    <text x="30" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#10B981">AFTER</text>
    
    <!-- Clean layout -->
    <rect x="30" y="60" width="200" height="24" rx="12" fill="#4F46E5"/>
    <rect x="30" y="100" width="360" height="16" rx="8" fill="#E5E7EB"/>
    <rect x="30" y="126" width="320" height="16" rx="8" fill="#E5E7EB"/>
    <rect x="30" y="170" width="140" height="44" rx="22" fill="#4F46E5"/>
    <rect x="30" y="230" width="360" height="50" rx="12" fill="#ECFDF5"/>
    <circle cx="340" cy="255" r="15" fill="#10B981"/>
    <path d="M 333 255 L 338 260 L 347 250" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
