<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.04" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#FAFBFC"/>
  
  <!-- Abstract geometric shapes -->
  <circle cx="200" cy="150" r="120" fill="url(#grad1)"/>
  <circle cx="900" cy="400" r="180" fill="url(#grad2)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#4F46E5" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#4F46E5" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#4F46E5" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#4F46E5" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#4F46E5" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#4F46E5" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#4F46E5" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#4F46E5" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="600" stroke="#4F46E5" stroke-width="1"/>
  </g>
  
  <!-- Floating cards/mockups -->
  <g transform="translate(300, 200)">
    <rect width="240" height="160" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(79,70,229,0.15))"/>
    <rect x="20" y="20" width="200" height="12" rx="6" fill="#EEF2FF"/>
    <rect x="20" y="44" width="160" height="12" rx="6" fill="#EEF2FF"/>
    <rect x="20" y="68" width="180" height="12" rx="6" fill="#EEF2FF"/>
    <rect x="20" y="100" width="80" height="32" rx="16" fill="#4F46E5"/>
  </g>
  
  <g transform="translate(650, 250)">
    <rect width="200" height="140" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(79,70,229,0.12))"/>
    <circle cx="100" cy="50" r="30" fill="#ECFDF5"/>
    <rect x="40" y="95" width="120" height="10" rx="5" fill="#F3F4F6"/>
    <rect x="60" y="115" width="80" height="10" rx="5" fill="#F3F4F6"/>
  </g>
  
  <!-- Connecting lines -->
  <path d="M 420 280 Q 540 200 650 290" stroke="#4F46E5" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Dots -->
  <circle cx="420" cy="280" r="6" fill="#4F46E5"/>
  <circle cx="650" cy="290" r="6" fill="#10B981"/>
</svg>
