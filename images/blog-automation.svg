<svg width="600" height="340" viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blogGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="340" fill="url(#blogGrad2)"/>
  
  <!-- Clock with automation -->
  <g transform="translate(300, 140)">
    <circle r="70" fill="white" filter="drop-shadow(0 10px 30px rgba(5,150,105,0.2))"/>
    <circle r="60" fill="none" stroke="#059669" stroke-width="4"/>
    
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="10" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
    <circle r="6" fill="#059669"/>
    
    <!-- Automation arrows circling -->
    <path d="M -80 0 A 80 80 0 0 1 0 -80" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="8,4"/>
    <path d="M 0 -80 A 80 80 0 0 1 80 0" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="8,4"/>
    
    <!-- Arrow heads -->
    <path d="M -85 10 L -80 0 L -70 5" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 10 -85 L 0 -80 L 5 -70" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Time saved badge -->
  <g transform="translate(300, 280)">
    <rect width="180" height="50" rx="25" fill="white" filter="drop-shadow(0 6px 20px rgba(5,150,105,0.2))"/>
    <text x="90" y="32" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#059669" text-anchor="middle">Save 10+ Hours</text>
  </g>
</svg>
