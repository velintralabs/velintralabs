<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Browser window mockup -->
  <g transform="translate(150, 80)">
    <rect width="500" height="340" rx="16" fill="white" filter="drop-shadow(0 20px 60px rgba(79,70,229,0.2))"/>
    
    <!-- Browser bar -->
    <rect x="0" y="0" width="500" height="40" rx="16" fill="#F9FAFB"/>
    <rect x="0" y="20" width="500" height="20" fill="#F9FAFB"/>
    <circle cx="20" cy="20" r="6" fill="#FCA5A5"/>
    <circle cx="40" cy="20" r="6" fill="#FCD34D"/>
    <circle cx="60" cy="20" r="6" fill="#6EE7B7"/>
    
    <!-- Content -->
    <rect x="30" y="70" width="200" height="24" rx="12" fill="#4F46E5"/>
    <rect x="30" y="110" width="440" height="16" rx="8" fill="#E5E7EB"/>
    <rect x="30" y="138" width="380" height="16" rx="8" fill="#E5E7EB"/>
    <rect x="30" y="166" width="420" height="16" rx="8" fill="#E5E7EB"/>
    
    <!-- CTA Button -->
    <rect x="30" y="210" width="140" height="44" rx="22" fill="#4F46E5"/>
    <rect x="60" y="228" width="80" height="8" rx="4" fill="white"/>
    
    <!-- Stats cards -->
    <g transform="translate(30, 280)">
      <rect width="130" height="80" rx="12" fill="#EEF2FF"/>
      <text x="65" y="45" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#4F46E5" text-anchor="middle">2.4x</text>
      <text x="65" y="65" font-family="Inter, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">More Leads</text>
    </g>
    
    <g transform="translate(185, 280)">
      <rect width="130" height="80" rx="12" fill="#ECFDF5"/>
      <text x="65" y="45" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#10B981" text-anchor="middle">85%</text>
      <text x="65" y="65" font-family="Inter, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Faster Load</text>
    </g>
    
    <g transform="translate(340, 280)">
      <rect width="130" height="80" rx="12" fill="#FEF3C7"/>
      <text x="65" y="45" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#D97706" text-anchor="middle">3x</text>
      <text x="65" y="65" font-family="Inter, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Conversions</text>
    </g>
  </g>
</svg>
