<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Automation flow diagram -->
  <g transform="translate(100, 100)">
    <!-- Step 1 -->
    <g>
      <rect width="160" height="100" rx="16" fill="white" filter="drop-shadow(0 8px 24px rgba(217,119,6,0.15))"/>
      <circle cx="80" cy="35" r="20" fill="#FEF3C7"/>
      <path d="M 70 35 L 77 42 L 90 28" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="30" y="65" width="100" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="40" y="80" width="80" height="8" rx="4" fill="#F3F4F6"/>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 160 150 L 220 150" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 210 140 L 220 150 L 210 160" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Step 2 -->
    <g transform="translate(220, 50)">
      <rect width="160" height="100" rx="16" fill="white" filter="drop-shadow(0 8px 24px rgba(217,119,6,0.15))"/>
      <circle cx="80" cy="35" r="20" fill="#FEF3C7"/>
      <path d="M 70 35 Q 80 25 90 35 Q 80 45 70 35" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="30" y="65" width="100" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="40" y="80" width="80" height="8" rx="4" fill="#F3F4F6"/>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 380 150 L 440 150" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 430 140 L 440 150 L 430 160" stroke="#D97706" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Step 3 -->
    <g transform="translate(440, 50)">
      <rect width="160" height="100" rx="16" fill="white" filter="drop-shadow(0 8px 24px rgba(217,119,6,0.15))"/>
      <circle cx="80" cy="35" r="20" fill="#ECFDF5"/>
      <path d="M 70 35 L 90 35 M 80 25 L 80 45" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="30" y="65" width="100" height="8" rx="4" fill="#F3F4F6"/>
      <rect x="40" y="80" width="80" height="8" rx="4" fill="#F3F4F6"/>
    </g>
  </g>
  
  <!-- Time saved badge -->
  <g transform="translate(300, 380)">
    <rect width="200" height="80" rx="40" fill="white" filter="drop-shadow(0 10px 30px rgba(217,119,6,0.2))"/>
    <text x="100" y="40" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#D97706" text-anchor="middle">85%</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Time Saved</text>
  </g>
</svg>
